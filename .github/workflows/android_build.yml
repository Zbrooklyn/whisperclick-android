name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        lfs: true

    - name: Initialize Submodules Explicitly
      run: git submodule update --init --recursive

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate debug keystore if not in repo
      run: |
        if [ ! -f debug.keystore ]; then
          keytool -genkeypair \
            -alias androiddebugkey \
            -keypass android \
            -keystore debug.keystore \
            -storepass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 30000
        fi

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Read version from build.gradle
      id: version
      run: |
        VERSION_NAME=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
        VERSION_CODE=$(grep 'versionCode' app/build.gradle | head -1 | sed 's/[^0-9]*//g')
        echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
        echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
        echo "Version: $VERSION_NAME (code $VERSION_CODE)"

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: whisperclick-${{ steps.version.outputs.name }}-debug
        path: app/build/outputs/apk/debug/whisperclick-${{ steps.version.outputs.name }}-debug.apk

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.name }}
        name: WhisperClick v${{ steps.version.outputs.name }}
        draft: false
        prerelease: ${{ contains(steps.version.outputs.name, 'beta') || contains(steps.version.outputs.name, 'alpha') }}
        make_latest: true
        files: app/build/outputs/apk/debug/whisperclick-${{ steps.version.outputs.name }}-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload debug keystore
      uses: actions/upload-artifact@v4
      if: ${{ hashFiles('debug.keystore') != '' }}
      with:
        name: debug-keystore
        path: debug.keystore
